<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowLift" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
    <pattern id="gridLift" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#eee" stroke-width="0.5"/>
    </pattern>
    <!-- 螺纹图案 -->
    <pattern id="screw" width="6" height="12" patternUnits="userSpaceOnUse">
      <path d="M0,0 L6,6 M0,6 L6,12" stroke="#888" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#fafafa"/>
  <rect width="600" height="800" fill="url(#gridLift)"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">丝杠升降机构示意图（正视图）</text>
  <text x="300" y="55" text-anchor="middle" font-size="12" fill="#888">步进电机 + 滚珠丝杠 + 直线导轨</text>

  <!-- ============ 底座平台 ============ -->
  <g>
    <rect x="120" y="650" width="360" height="40" rx="4" fill="#9e9e9e" stroke="#616161" stroke-width="2.5"/>
    <rect x="140" y="640" width="320" height="15" rx="3" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1.5"/>
    <!-- 底座安装孔 -->
    <circle cx="170" cy="670" r="6" fill="#fff" stroke="#616161" stroke-width="1.5"/>
    <circle cx="430" cy="670" r="6" fill="#fff" stroke="#616161" stroke-width="1.5"/>
    <text x="300" y="710" text-anchor="middle" font-size="14" font-weight="bold" fill="#616161">底座平台</text>
  </g>

  <!-- ============ 直线导轨（左） ============ -->
  <g>
    <!-- 导轨立柱 -->
    <rect x="160" y="250" width="18" height="395" rx="2" fill="#78909c" stroke="#546e7a" stroke-width="2"/>
    <!-- 滑块（左） -->
    <rect x="153" y="330" width="32" height="50" rx="3" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
    <line x1="157" y1="340" x2="181" y2="340" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="157" y1="350" x2="181" y2="350" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="157" y1="360" x2="181" y2="360" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="157" y1="370" x2="181" y2="370" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ============ 直线导轨（右） ============ -->
  <g>
    <!-- 导轨立柱 -->
    <rect x="422" y="250" width="18" height="395" rx="2" fill="#78909c" stroke="#546e7a" stroke-width="2"/>
    <!-- 滑块（右） -->
    <rect x="415" y="330" width="32" height="50" rx="3" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
    <line x1="419" y1="340" x2="443" y2="340" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="419" y1="350" x2="443" y2="350" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="419" y1="360" x2="443" y2="360" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <line x1="419" y1="370" x2="443" y2="370" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ============ 滚珠丝杠（中间） ============ -->
  <g>
    <!-- 丝杠轴 -->
    <rect x="295" y="260" width="10" height="385" rx="2" fill="url(#screw)" stroke="#757575" stroke-width="1.5"/>
    <!-- 丝杠螺母 -->
    <rect x="283" y="335" width="34" height="35" rx="4" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
    <text x="300" y="357" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">螺母</text>
    <!-- 丝杠上轴承座 -->
    <rect x="280" y="250" width="40" height="18" rx="3" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1.5"/>
    <circle cx="300" cy="259" r="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
    <!-- 丝杠下轴承座 -->
    <rect x="280" y="635" width="40" height="18" rx="3" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1.5"/>
    <circle cx="300" cy="644" r="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  </g>

  <!-- ============ 升降平台（可动） ============ -->
  <g>
    <!-- 平台主体 -->
    <rect x="140" y="310" width="320" height="25" rx="4" fill="#66bb6a" stroke="#2e7d32" stroke-width="2.5"/>
    <!-- 平台加强筋 -->
    <line x1="160" y1="322" x2="440" y2="322" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <!-- 连接滑块的凸台 -->
    <rect x="157" y="305" width="24" height="10" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
    <rect x="419" y="305" width="24" height="10" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
    <!-- 连接螺母的凸台 -->
    <rect x="288" y="305" width="24" height="10" rx="2" fill="#42a5f5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="300" y="298" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">升降平台</text>
  </g>

  <!-- ============ 步进电机（底部） ============ -->
  <g>
    <!-- 电机主体 -->
    <rect x="255" y="655" width="90" height="55" rx="6" fill="#fbbc04" stroke="#e09800" stroke-width="2.5"/>
    <!-- 电机轴 -->
    <rect x="295" y="645" width="10" height="15" rx="1" fill="#9e9e9e" stroke="#616161" stroke-width="1.5"/>
    <!-- 电机标签 -->
    <text x="300" y="687" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">步进电机</text>
    <!-- 联轴器 -->
    <rect x="289" y="638" width="22" height="12" rx="3" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="292" y1="641" x2="308" y2="641" stroke="#9e9e9e" stroke-width="0.8"/>
    <line x1="292" y1="647" x2="308" y2="647" stroke="#9e9e9e" stroke-width="0.8"/>
    <text x="300" y="634" text-anchor="middle" font-size="10" fill="#757575">联轴器</text>
  </g>

  <!-- ============ 运动方向箭头 ============ -->
  <g>
    <!-- 上升箭头 -->
    <line x1="490" y1="330" x2="490" y2="260" stroke="#1a73e8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="505" y="298" font-size="12" font-weight="bold" fill="#1a73e8">升降</text>
    <text x="505" y="313" font-size="12" font-weight="bold" fill="#1a73e8">方向</text>
    <!-- 下降箭头 -->
    <line x1="490" y1="345" x2="490" y2="415" stroke="#1a73e8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- ============ 行程标注 ============ -->
  <g>
    <!-- 行程 H1（最高位置） -->
    <rect x="200" y="200" width="200" height="25" rx="4" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.35"/>
    <text x="300" y="217" text-anchor="middle" font-size="10" fill="#2e7d32">最高位置</text>

    <!-- 行程 H2（最低位置） -->
    <rect x="200" y="420" width="200" height="25" rx="4" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.35"/>
    <text x="300" y="437" text-anchor="middle" font-size="10" fill="#2e7d32">最低位置</text>

    <!-- 行程标注线 -->
    <line x1="130" y1="212" x2="130" y2="432" stroke="#e53935" stroke-width="1.8" stroke-dasharray="4,3"/>
    <line x1="120" y1="212" x2="140" y2="212" stroke="#e53935" stroke-width="1.8"/>
    <line x1="120" y1="432" x2="140" y2="432" stroke="#e53935" stroke-width="1.8"/>
    <text x="115" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935" transform="rotate(-90,115,325)">H（行程）</text>
  </g>

  <!-- ============ 导轨间距标注 ============ -->
  <g>
    <line x1="169" y1="470" x2="431" y2="470" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="169" y1="460" x2="169" y2="480" stroke="#ff6d00" stroke-width="1.5"/>
    <line x1="431" y1="460" x2="431" y2="480" stroke="#ff6d00" stroke-width="1.5"/>
    <text x="300" y="490" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff6d00">W（导轨间距）</text>
  </g>

  <!-- ============ 丝杠导程标注 ============ -->
  <g>
    <!-- 螺距示意 -->
    <line x1="320" y1="380" x2="320" y2="400" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="310" y1="380" x2="330" y2="380" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="310" y1="390" x2="330" y2="390" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="310" y1="400" x2="330" y2="400" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="345" y="394" font-size="11" font-weight="bold" fill="#7b1fa2">P（导程）</text>
  </g>

  <!-- ============ 标注框：关键参数 ============ -->
  <g transform="translate(30, 740)">
    <rect x="0" y="0" width="540" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="15" y="20" font-size="12" fill="#333" font-weight="bold">关键参数：</text>
    <text x="15" y="38" font-size="11" fill="#555">H — 升降行程</text>
    <text x="135" y="38" font-size="11" fill="#555">W — 导轨间距</text>
    <text x="270" y="38" font-size="11" fill="#555">P — 丝杠导程</text>
    <text x="400" y="38" font-size="11" fill="#555">F — 最大推力</text>
  </g>

  <!-- ============ 图例 ============ -->
  <g transform="translate(30, 520)">
    <rect x="0" y="0" width="540" height="80" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <!-- 导轨 -->
    <rect x="15" y="10" width="14" height="20" rx="2" fill="#78909c" stroke="#546e7a" stroke-width="1"/>
    <text x="36" y="25" font-size="11" fill="#333">直线导轨</text>
    <!-- 滑块 -->
    <rect x="120" y="10" width="18" height="16" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>
    <text x="144" y="25" font-size="11" fill="#333">滑块</text>
    <!-- 丝杠 -->
    <rect x="210" y="10" width="8" height="20" rx="1" fill="url(#screw)" stroke="#757575" stroke-width="1"/>
    <text x="224" y="25" font-size="11" fill="#333">滚珠丝杠</text>
    <!-- 螺母 -->
    <rect x="320" y="10" width="18" height="14" rx="2" fill="#42a5f5" stroke="#1565c0" stroke-width="1"/>
    <text x="344" y="25" font-size="11" fill="#333">丝杠螺母</text>
    <!-- 电机 -->
    <rect x="430" y="10" width="22" height="16" rx="3" fill="#fbbc04" stroke="#e09800" stroke-width="1"/>
    <text x="458" y="25" font-size="11" fill="#333">步进电机</text>
    <!-- 升降平台 -->
    <rect x="15" y="45" width="80" height="10" rx="2" fill="#66bb6a" stroke="#2e7d32" stroke-width="1"/>
    <text x="102" y="55" font-size="11" fill="#333">升降平台（可动）</text>
    <!-- 底座 -->
    <rect x="230" y="45" width="80" height="10" rx="2" fill="#9e9e9e" stroke="#616161" stroke-width="1"/>
    <text x="316" y="55" font-size="11" fill="#333">底座平台（固定）</text>
  </g>
</svg>