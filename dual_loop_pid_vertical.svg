<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 720" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#333"/></marker>
    <marker id="af" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#5c6bc0"/></marker>
  </defs>

  <rect width="520" height="720" rx="10" fill="#f8f9ff" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- 标题 -->
  <rect x="30" y="16" width="460" height="42" rx="8" fill="#283593"/>
  <text x="260" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">双环 PID 级联控制原理</text>

  <!-- ========== 控制框图 ========== -->
  <rect x="24" y="70" width="472" height="390" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 外环虚线框 -->
  <rect x="40" y="80" width="440" height="170" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.3"/>
  <text x="56" y="96" font-size="11" font-weight="bold" fill="#5c6bc0">外环 · 位姿环</text>

  <!-- 期望位姿 -->
  <rect x="180" y="102" width="160" height="26" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.3"/>
  <text x="260" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">期望位姿 (xᵣ, yᵣ, θᵣ)</text>
  <line x1="260" y1="128" x2="260" y2="139" stroke="#333" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 求和点 -->
  <circle cx="260" cy="150" r="10" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="256" y="154" font-size="12" font-weight="bold" fill="#333">−</text>
  <line x1="260" y1="160" x2="260" y2="171" stroke="#333" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 位姿PID -->
  <rect x="195" y="172" width="130" height="26" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="260" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">位姿 PID</text>
  <line x1="260" y1="198" x2="260" y2="209" stroke="#333" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="272" y="207" font-size="8" fill="#999">v , ω</text>

  <!-- 逆运动学 -->
  <rect x="195" y="210" width="130" height="20" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="1.2"/>
  <text x="260" y="224" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">逆运动学解算</text>
  <line x1="260" y1="230" x2="260" y2="237" stroke="#333" stroke-width="1.2"/>
  <circle cx="260" cy="238" r="2.5" fill="#333"/>

  <!-- 左右分支 -->
  <line x1="260" y1="238" x2="170" y2="238" stroke="#1565c0" stroke-width="1.2"/>
  <line x1="170" y1="238" x2="170" y2="261" stroke="#1565c0" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="180" y="253" font-size="8" fill="#1565c0">ωₗᵣ</text>

  <line x1="260" y1="238" x2="350" y2="238" stroke="#c62828" stroke-width="1.2"/>
  <line x1="350" y1="238" x2="350" y2="261" stroke="#c62828" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="360" y="253" font-size="8" fill="#c62828">ωᵣᵣ</text>

  <!-- 内环虚线框 -->
  <rect x="40" y="260" width="440" height="72" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.3"/>
  <text x="56" y="276" font-size="11" font-weight="bold" fill="#2e7d32">内环 · 轮速环</text>

  <!-- 左轮 -->
  <circle cx="170" cy="296" r="9" fill="#fff" stroke="#333" stroke-width="1.1"/>
  <text x="167" y="300" font-size="9" font-weight="bold" fill="#333">−</text>
  <line x1="179" y1="296" x2="193" y2="296" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="194" y="284" width="40" height="24" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.3"/>
  <text x="214" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">PI</text>
  <line x1="234" y1="296" x2="249" y2="296" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="250" y="286" width="46" height="20" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.3"/>
  <text x="273" y="300" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">左电机</text>

  <!-- 右轮 -->
  <circle cx="350" cy="296" r="9" fill="#fff" stroke="#333" stroke-width="1.1"/>
  <text x="347" y="300" font-size="9" font-weight="bold" fill="#333">−</text>
  <line x1="359" y1="296" x2="373" y2="296" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="374" y="284" width="40" height="24" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.3"/>
  <text x="394" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">PI</text>
  <line x1="414" y1="296" x2="429" y2="296" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="430" y="286" width="46" height="20" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.3"/>
  <text x="453" y="300" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">右电机</text>

  <!-- 差速底盘 -->
  <line x1="273" y1="306" x2="273" y2="348" stroke="#333" stroke-width="1.1"/>
  <line x1="273" y1="348" x2="260" y2="358" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="453" y1="306" x2="453" y2="348" stroke="#333" stroke-width="1.1"/>
  <line x1="453" y1="348" x2="350" y2="358" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>

  <rect x="140" y="358" width="240" height="32" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="260" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">差速底盘</text>
  <text x="260" y="386" text-anchor="middle" font-size="8" fill="#999">双轮差速驱动 + 万向轮</text>

  <!-- 反馈 -->
  <line x1="260" y1="390" x2="260" y2="405" stroke="#333" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="165" y="406" width="190" height="20" rx="4" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.1"/>
  <text x="260" y="420" text-anchor="middle" font-size="9" font-weight="bold" fill="#5c6bc0">编码器 → ωₗ, ωᵣ · 航位推算 → x, y, θ</text>

  <!-- 反馈回路1: 位姿反馈到求和点 (左→上→右, 路由到框外x=30) -->
  <polyline points="165,416 30,416 30,150 250,150" fill="none" stroke="#5c6bc0" stroke-width="1" marker-end="url(#af)"/>

  <!-- 反馈回路2: 左轮速反馈到左PI (左→上→右, 路由到框外x=15) -->
  <polyline points="165,416 15,416 15,296 161,296" fill="none" stroke="#5c6bc0" stroke-width="1" marker-end="url(#af)"/>

  <!-- 反馈回路3: 右轮速反馈到右PI (右→上→左, 路由到框外x=495) -->
  <polyline points="355,416 495,416 495,296 359,296" fill="none" stroke="#5c6bc0" stroke-width="1" marker-end="url(#af)"/>

  <!-- ========== 文字说明 ========== -->
  <rect x="24" y="472" width="472" height="236" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="44" y="484" width="80" height="24" rx="5" fill="#283593"/>
  <text x="84" y="501" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">原理说明</text>

  <text x="44" y="526" font-size="11" font-weight="bold" fill="#283593">外环 · 位姿环</text>
  <text x="44" y="544" font-size="10" fill="#444">期望位姿与航位推算反馈做差，</text>
  <text x="44" y="558" font-size="10" fill="#444">经 PID 输出速度指令 (v, ω)。</text>
  <text x="44" y="572" font-size="10" fill="#666">Kp=3.0  Ki=0.2  Kd=0.4</text>

  <text x="44" y="596" font-size="11" font-weight="bold" fill="#283593">内环 · 轮速环</text>
  <text x="44" y="614" font-size="10" fill="#444">逆运动学将 (v,ω) 解算为左右轮</text>
  <text x="44" y="628" font-size="10" fill="#444">目标角速度，PI 输出 PWM 驱动。</text>
  <text x="44" y="642" font-size="10" fill="#666">Kp=17.0  Ki=103.0  Ts=5ms</text>

  <text x="280" y="526" font-size="11" font-weight="bold" fill="#283593">级联控制优势</text>

  <rect x="280" y="534" width="200" height="28" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="0.8"/>
  <text x="292" y="552" font-size="10" fill="#2e7d32">✦ 内外环解耦，调试独立</text>

  <rect x="280" y="566" width="200" height="28" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="292" y="584" font-size="10" fill="#1565c0">✦ 内环快速抑制电机扰动</text>

  <rect x="280" y="598" width="200" height="28" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="0.8"/>
  <text x="292" y="616" font-size="10" fill="#e65100">✦ 外环专注轨迹跟踪精度</text>

  <rect x="280" y="630" width="200" height="28" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="292" y="648" font-size="10" fill="#7b1fa2">✦ 限幅保护 ±24V / ±1.5rad/s</text>

  <line x1="44" y1="668" x2="476" y2="668" stroke="#e8eaf6" stroke-width="1"/>
  <text x="260" y="688" text-anchor="middle" font-size="9" fill="#999">电压限幅 ±24V　·　角速度限幅 ±1.5 rad/s　·　控制周期 5ms</text>

</svg>