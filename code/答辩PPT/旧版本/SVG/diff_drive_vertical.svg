<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 820" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d93025"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
  </defs>

  <rect width="520" height="820" rx="10" fill="#f8f9ff" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- ========== 标题 ========== -->
  <rect x="30" y="16" width="460" height="42" rx="8" fill="#283593"/>
  <text x="260" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">双轮差速移动机器人模型</text>

  <!-- ========== 俯视图 ========== -->
  <rect x="60" y="72" width="400" height="370" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="260" y="92" text-anchor="middle" font-size="12" fill="#999">俯视图 · 2 驱动轮 + 4 万向轮</text>

  <!-- 底盘 -->
  <rect x="140" y="130" width="240" height="280" rx="16" fill="#e8f0fe" stroke="#4285f4" stroke-width="2.5"/>

  <!-- 中心线 -->
  <line x1="140" y1="270" x2="380" y2="270" stroke="#4285f4" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.3"/>
  <line x1="260" y1="130" x2="260" y2="410" stroke="#4285f4" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- 左驱动轮 -->
  <rect x="144" y="245" width="28" height="55" rx="4" fill="#34a853" stroke="#1e7e34" stroke-width="2"/>
  <line x1="151" y1="252" x2="151" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="158" y1="252" x2="158" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="165" y1="252" x2="165" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="172" cy="272" r="7" fill="#fbbc04" stroke="#e09800" stroke-width="1.5"/>
  <text x="172" y="276" text-anchor="middle" font-size="8" font-weight="bold" fill="#333">M</text>
  <text x="158" y="316" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e7e34">左驱动轮</text>

  <!-- 右驱动轮 -->
  <rect x="348" y="245" width="28" height="55" rx="4" fill="#34a853" stroke="#1e7e34" stroke-width="2"/>
  <line x1="355" y1="252" x2="355" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="362" y1="252" x2="362" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="369" y1="252" x2="369" y2="293" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="348" cy="272" r="7" fill="#fbbc04" stroke="#e09800" stroke-width="1.5"/>
  <text x="348" y="276" text-anchor="middle" font-size="8" font-weight="bold" fill="#333">M</text>
  <text x="362" y="316" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e7e34">右驱动轮</text>

  <!-- 万向轮 左前 -->
  <ellipse cx="180" cy="158" rx="18" ry="14" fill="#ea4335" stroke="#c5221f" stroke-width="1.5"/>
  <line x1="168" y1="150" x2="192" y2="166" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <line x1="168" y1="166" x2="192" y2="150" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <circle cx="180" cy="158" r="2.5" fill="#fff"/>
  <text x="180" y="186" text-anchor="middle" font-size="9" fill="#c5221f">万向轮1</text>

  <!-- 万向轮 右前 -->
  <ellipse cx="340" cy="158" rx="18" ry="14" fill="#ea4335" stroke="#c5221f" stroke-width="1.5"/>
  <line x1="328" y1="150" x2="352" y2="166" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <line x1="328" y1="166" x2="352" y2="150" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <circle cx="340" cy="158" r="2.5" fill="#fff"/>
  <text x="340" y="186" text-anchor="middle" font-size="9" fill="#c5221f">万向轮2</text>

  <!-- 万向轮 左后 -->
  <ellipse cx="180" cy="385" rx="18" ry="14" fill="#ea4335" stroke="#c5221f" stroke-width="1.5"/>
  <line x1="168" y1="377" x2="192" y2="393" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <line x1="168" y1="393" x2="192" y2="377" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <circle cx="180" cy="385" r="2.5" fill="#fff"/>
  <text x="180" y="413" text-anchor="middle" font-size="9" fill="#c5221f">万向轮3</text>

  <!-- 万向轮 右后 -->
  <ellipse cx="340" cy="385" rx="18" ry="14" fill="#ea4335" stroke="#c5221f" stroke-width="1.5"/>
  <line x1="328" y1="377" x2="352" y2="393" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <line x1="328" y1="393" x2="352" y2="377" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <circle cx="340" cy="385" r="2.5" fill="#fff"/>
  <text x="340" y="413" text-anchor="middle" font-size="9" fill="#c5221f">万向轮4</text>

  <!-- 坐标系 -->
  <g transform="translate(260, 272)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#d93025" stroke-width="2" marker-end="url(#arrR)"/>
    <text x="56" y="4" font-size="12" font-weight="bold" fill="#d93025">X</text>
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrB)"/>
    <text x="-4" y="-56" font-size="12" font-weight="bold" fill="#1a73e8">Y</text>
    <circle cx="0" cy="0" r="3" fill="#333"/>
    <text x="8" y="14" font-size="10" fill="#555">O</text>
  </g>

  <!-- 轮距标注 -->
  <line x1="158" y1="272" x2="362" y2="272" stroke="#ff6d00" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="158" y1="264" x2="158" y2="280" stroke="#ff6d00" stroke-width="1.2"/>
  <line x1="362" y1="264" x2="362" y2="280" stroke="#ff6d00" stroke-width="1.2"/>
  <text x="260" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6d00">L（轮距）</text>

  <!-- 前进方向 -->
  <line x1="260" y1="280" x2="260" y2="330" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="275" y="312" font-size="10" fill="#555">前进</text>

  <!-- ========== 差速原理 ========== -->
  <rect x="30" y="456" width="460" height="140" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="48" y="468" width="80" height="24" rx="5" fill="#283593"/>
  <text x="88" y="485" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">差速原理</text>

  <!-- 公式区 -->
  <text x="60" y="512" font-size="11" fill="#444">左右轮独立驱动，通过转速差实现转向：</text>

  <text x="80" y="538" font-size="12" fill="#283593">v = (vₗ + vᵣ) / 2</text>
  <text x="80" y="558" font-size="12" fill="#283593">ω = (vᵣ − vₗ) / L</text>

  <text x="280" y="538" font-size="10" fill="#666">vₗ、vᵣ — 左右轮线速度</text>
  <text x="280" y="556" font-size="10" fill="#666">L — 轮距（两驱动轮间距）</text>
  <text x="280" y="574" font-size="10" fill="#666">v — 整车线速度，ω — 角速度</text>

  <!-- ========== 运动状态 ========== -->
  <rect x="30" y="606" width="460" height="196" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="48" y="618" width="80" height="24" rx="5" fill="#283593"/>
  <text x="88" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">运动状态</text>

  <!-- 四种状态卡片 -->
  <rect x="48" y="650" width="100" height="60" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="98" y="670" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">直行</text>
  <text x="98" y="686" text-anchor="middle" font-size="9" fill="#444">vₗ = vᵣ</text>
  <text x="98" y="700" text-anchor="middle" font-size="9" fill="#666">ω = 0</text>

  <rect x="160" y="650" width="100" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="210" y="670" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">左转</text>
  <text x="210" y="686" text-anchor="middle" font-size="9" fill="#444">vₗ &lt; vᵣ</text>
  <text x="210" y="700" text-anchor="middle" font-size="9" fill="#666">ω &gt; 0</text>

  <rect x="272" y="650" width="100" height="60" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="322" y="670" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">右转</text>
  <text x="322" y="686" text-anchor="middle" font-size="9" fill="#444">vₗ &gt; vᵣ</text>
  <text x="322" y="700" text-anchor="middle" font-size="9" fill="#666">ω &lt; 0</text>

  <rect x="384" y="650" width="90" height="60" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="429" y="670" text-anchor="middle" font-size="10" font-weight="bold" fill="#7b1fa2">原地转</text>
  <text x="429" y="686" text-anchor="middle" font-size="9" fill="#444">vₗ = −vᵣ</text>
  <text x="429" y="700" text-anchor="middle" font-size="9" fill="#666">v = 0</text>

  <!-- 说明文字 -->
  <text x="60" y="734" font-size="10" fill="#444">结构简单、转弯灵活，适合室内平坦地面。万向轮仅起支撑作用，不参与驱动。</text>
  <text x="60" y="752" font-size="10" fill="#444">通过编码器反馈轮速，结合航位推算可实现自主定位与导航。</text>

  <!-- 图例 -->
  <g transform="translate(48, 772)">
    <rect x="0" y="0" width="424" height="24" rx="4" fill="#f5f5f5" stroke="#eee" stroke-width="0.8"/>
    <rect x="10" y="6" width="12" height="12" rx="2" fill="#34a853" stroke="#1e7e34" stroke-width="0.8"/>
    <text x="26" y="16" font-size="9" fill="#555">驱动轮</text>
    <ellipse cx="100" cy="12" rx="7" ry="5" fill="#ea4335" stroke="#c5221f" stroke-width="0.8"/>
    <text x="110" y="16" font-size="9" fill="#555">万向轮</text>
    <circle cx="175" cy="12" r="5" fill="#fbbc04" stroke="#e09800" stroke-width="0.8"/>
    <text x="184" y="16" font-size="9" fill="#555">电机 M</text>
    <text x="240" y="16" font-size="9" fill="#555">坐标：X-前进方向，Y-左侧</text>
  </g>

</svg>