<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 750" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#333"/></marker>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1565c0"/></marker>
  </defs>

  <rect width="520" height="750" rx="10" fill="#f8f9ff" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- 标题 -->
  <rect x="30" y="16" width="460" height="42" rx="8" fill="#283593"/>
  <text x="260" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">差速运动学模型与仿真原理</text>

  <!-- ========== 上：模型示意 ========== -->
  <rect x="24" y="70" width="472" height="260" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 模型背景 -->
  <rect x="40" y="82" width="200" height="230" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1" opacity="0.15"/>
  <text x="140" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#5c6bc0">差速底盘模型</text>

  <!-- 车体 -->
  <rect x="80" y="120" width="120" height="70" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">车体</text>
  <text x="140" y="165" text-anchor="middle" font-size="8" fill="#666">轮距 L = 0.52m</text>

  <!-- 左轮 -->
  <circle cx="80" cy="190" r="12" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="80" y="194" text-anchor="middle" font-size="8" font-weight="bold" fill="#2e7d32">L</text>
  <text x="80" y="212" text-anchor="middle" font-size="8" fill="#2e7d32">ω_L</text>

  <!-- 右轮 -->
  <circle cx="200" cy="190" r="12" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="200" y="194" text-anchor="middle" font-size="8" font-weight="bold" fill="#c62828">R</text>
  <text x="200" y="212" text-anchor="middle" font-size="8" fill="#c62828">ω_R</text>

  <!-- 万向轮 -->
  <circle cx="100" cy="240" r="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <circle cx="140" cy="245" r="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <circle cx="180" cy="240" r="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="140" y="262" text-anchor="middle" font-size="7" fill="#999">万向从动轮</text>

  <!-- 速度箭头 -->
  <line x1="140" y1="120" x2="140" y2="96" stroke="#1565c0" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="152" y="100" font-size="9" font-weight="bold" fill="#1565c0">v</text>

  <!-- 航向箭头 -->
  <line x1="200" y1="140" x2="230" y2="140" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="235" y="144" font-size="9" font-weight="bold" fill="#7b1fa2">θ</text>

  <!-- 半径标注 -->
  <line x1="80" y1="155" x2="50" y2="155" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="36" y="159" font-size="7" fill="#999">r=0.09m</text>

  <!-- 右侧：正运动学方程 -->
  <rect x="260" y="82" width="220" height="230" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" opacity="0.3"/>
  <text x="370" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">正运动学方程</text>

  <text x="276" y="126" font-size="10" font-weight="bold" fill="#333">轮速 → 速度</text>
  <text x="276" y="146" font-size="11" fill="#1565c0" font-weight="bold">v = (v_R + v_L) / 2</text>
  <text x="276" y="166" font-size="11" fill="#1565c0" font-weight="bold">ω = (v_R − v_L) / L</text>

  <line x1="276" y1="180" x2="460" y2="180" stroke="#ccc" stroke-width="0.8"/>

  <text x="276" y="200" font-size="10" font-weight="bold" fill="#333">速度 → 位姿</text>
  <text x="276" y="220" font-size="11" fill="#1565c0" font-weight="bold">ẋ = v · cos θ</text>
  <text x="276" y="240" font-size="11" fill="#1565c0" font-weight="bold">ẏ = v · sin θ</text>
  <text x="276" y="260" font-size="11" fill="#1565c0" font-weight="bold">θ̇ = ω</text>

  <line x1="276" y1="274" x2="460" y2="274" stroke="#ccc" stroke-width="0.8"/>
  <text x="276" y="292" font-size="9" fill="#666">积分得: x(t), y(t), θ(t)</text>

  <!-- ========== 中：仿真流程框图 ========== -->
  <rect x="24" y="344" width="472" height="170" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="44" y="356" width="80" height="24" rx="5" fill="#283593"/>
  <text x="84" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">仿真流程</text>

  <!-- 流程框 -->
  <!-- v(t),ω(t) 输入 -->
  <rect x="40" y="395" width="80" height="36" rx="4" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.2"/>
  <text x="80" y="411" text-anchor="middle" font-size="9" font-weight="bold" fill="#283593">速度指令</text>
  <text x="80" y="424" text-anchor="middle" font-size="8" fill="#666">v(t), ω(t)</text>
  <line x1="120" y1="413" x2="140" y2="413" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 运动学解算 -->
  <rect x="140" y="395" width="90" height="36" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1.2"/>
  <text x="185" y="411" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">运动学解算</text>
  <text x="185" y="424" text-anchor="middle" font-size="7" fill="#666">ω_L, ω_R → v, ω</text>
  <line x1="230" y1="413" x2="250" y2="413" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 数值积分 -->
  <rect x="250" y="395" width="80" height="36" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="290" y="411" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">前向欧拉</text>
  <text x="290" y="424" text-anchor="middle" font-size="7" fill="#666">Δt=0.01s</text>
  <line x1="330" y1="413" x2="350" y2="413" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 位姿更新 -->
  <rect x="350" y="395" width="80" height="36" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="390" y="411" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">位姿更新</text>
  <text x="390" y="424" text-anchor="middle" font-size="7" fill="#666">x, y, θ</text>
  <line x1="430" y1="413" x2="448" y2="413" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 输出 -->
  <rect x="448" y="400" width="40" height="26" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="468" y="417" text-anchor="middle" font-size="8" font-weight="bold" fill="#7b1fa2">轨迹</text>

  <!-- 回环箭头 -->
  <line x1="390" y1="431" x2="390" y2="448" stroke="#5c6bc0" stroke-width="1"/>
  <line x1="390" y1="448" x2="80" y2="448" stroke="#5c6bc0" stroke-width="1"/>
  <line x1="80" y1="448" x2="80" y2="431" stroke="#5c6bc0" stroke-width="1" marker-end="url(#arrB)"/>
  <text x="235" y="460" text-anchor="middle" font-size="8" fill="#5c6bc0">下一时刻 t+Δt</text>

  <!-- 关键参数 -->
  <text x="40" y="485" font-size="9" fill="#666">仿真参数: 步长0.01s | 轮半径0.09m | 轮距0.52m | 标称速度0.3m/s</text>

  <!-- ========== 下：四类轨迹 ========== -->
  <rect x="24" y="526" width="472" height="208" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="44" y="538" width="100" height="24" rx="5" fill="#283593"/>
  <text x="94" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">四类典型轨迹</text>

  <!-- 直线 -->
  <rect x="40" y="572" width="100" height="60" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <line x1="50" y1="612" x2="130" y2="612" stroke="#2e7d32" stroke-width="2.5"/>
  <circle cx="50" cy="612" r="3" fill="#4caf50"/>
  <circle cx="130" cy="612" r="3" fill="#c62828"/>
  <text x="90" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">直线运动</text>
  <text x="90" y="628" text-anchor="middle" font-size="8" fill="#666">v=0.45 ω=0</text>
  <text x="90" y="640" text-anchor="middle" font-size="8" fill="#666">路径 9.0m</text>

  <!-- 圆弧 -->
  <rect x="150" y="572" width="100" height="60" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <path d="M 165 612 Q 200 582, 235 612" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="165" cy="612" r="3" fill="#4caf50"/>
  <circle cx="235" cy="612" r="3" fill="#c62828"/>
  <text x="200" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">定曲率圆弧</text>
  <text x="200" y="628" text-anchor="middle" font-size="8" fill="#666">v=0.35 ω=0.45</text>
  <text x="200" y="640" text-anchor="middle" font-size="8" fill="#666">路径 7.0m</text>

  <!-- S形 -->
  <rect x="260" y="572" width="100" height="60" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <path d="M 275 600 Q 295 582, 310 600 Q 325 618, 345 600" fill="none" stroke="#e65100" stroke-width="2.5"/>
  <circle cx="275" cy="600" r="3" fill="#4caf50"/>
  <circle cx="345" cy="600" r="3" fill="#c62828"/>
  <text x="310" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">S形运动</text>
  <text x="310" y="628" text-anchor="middle" font-size="8" fill="#666">ω=0.6sin(0.5t)</text>
  <text x="310" y="640" text-anchor="middle" font-size="8" fill="#666">路径 8.0m</text>

  <!-- 8字 -->
  <rect x="370" y="572" width="100" height="60" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <path d="M 390 600 C 390 582, 450 582, 450 600 C 450 618, 390 618, 390 600" fill="none" stroke="#7b1fa2" stroke-width="2.5"/>
  <circle cx="390" cy="600" r="3" fill="#4caf50"/>
  <circle cx="450" cy="600" r="3" fill="#c62828"/>
  <text x="420" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">8字形运动</text>
  <text x="420" y="628" text-anchor="middle" font-size="8" fill="#666">ω=0.7sin(0.7t)</text>
  <text x="420" y="640" text-anchor="middle" font-size="8" fill="#666">路径 7.6m</text>

  <!-- 起终点标记 -->
  <g transform="translate(40,650)">
    <circle cx="8" cy="6" r="4" fill="#4caf50"/><text x="16" y="10" font-size="8" fill="#555">起点</text>
    <circle cx="68" cy="6" r="4" fill="#c62828"/><text x="76" y="10" font-size="8" fill="#555">终点</text>
    <text x="140" y="10" font-size="8" fill="#999">v=线速度(m/s)  ω=角速度(rad/s)  路径=轨迹总长度</text>
  </g>

  <!-- 底部参数栏 -->
  <line x1="44" y1="680" x2="476" y2="680" stroke="#e8eaf6" stroke-width="1"/>
  <text x="260" y="700" text-anchor="middle" font-size="9" fill="#999">积分步长 0.01s　·　仿真时长 20s　·　初始位姿 (0,0,0)　·　前向欧拉积分</text>
  <text x="260" y="718" text-anchor="middle" font-size="9" fill="#999">验证了差速底盘在直线、转弯、连续变曲率工况下的运动学响应特性</text>

</svg>