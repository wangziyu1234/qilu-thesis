<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Microsoft YaHei, SimHei, sans-serif">
  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Hybrid A* 路径规划原理示意图</text>

  <!-- 左侧：栅格地图与路径规划 -->
  <g transform="translate(30, 60)">
    <text x="200" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">仓储环境栅格地图与路径规划</text>

    <!-- 栅格背景 -->
    <g opacity="0.15">
      <!-- 竖线 -->
      <line x1="0" y1="30" x2="0" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="26.67" y1="30" x2="26.67" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="53.33" y1="30" x2="53.33" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="80" y1="30" x2="80" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="106.67" y1="30" x2="106.67" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="133.33" y1="30" x2="133.33" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="160" y1="30" x2="160" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="186.67" y1="30" x2="186.67" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="213.33" y1="30" x2="213.33" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="240" y1="30" x2="240" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="266.67" y1="30" x2="266.67" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="293.33" y1="30" x2="293.33" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="320" y1="30" x2="320" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="346.67" y1="30" x2="346.67" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="373.33" y1="30" x2="373.33" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="400" y1="30" x2="400" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
      <!-- 横线 -->
      <line x1="0" y1="30" x2="400" y2="30" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="56.67" x2="400" y2="56.67" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="83.33" x2="400" y2="83.33" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="110" x2="400" y2="110" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="136.67" x2="400" y2="136.67" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="163.33" x2="400" y2="163.33" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="190" x2="400" y2="190" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="216.67" x2="400" y2="216.67" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="243.33" x2="400" y2="243.33" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="270" x2="400" y2="270" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="296.67" x2="400" y2="296.67" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="323.33" x2="400" y2="323.33" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="350" x2="400" y2="350" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="376.67" x2="400" y2="376.67" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="403.33" x2="400" y2="403.33" stroke="#95a5a6" stroke-width="0.5"/>
      <line x1="0" y1="430" x2="400" y2="430" stroke="#95a5a6" stroke-width="0.5"/>
    </g>

    <!-- 地图边框 -->
    <rect x="0" y="30" width="400" height="400" fill="none" stroke="#2c3e50" stroke-width="1.5"/>

    <!-- 障碍物（货架） -->
    <rect x="53" y="57" width="80" height="53" fill="#3498db" rx="3"/>
    <text x="93" y="90" text-anchor="middle" font-size="11" fill="white">货架1</text>

    <rect x="187" y="83" width="80" height="80" fill="#3498db" rx="3"/>
    <text x="227" y="130" text-anchor="middle" font-size="11" fill="white">货架2</text>

    <rect x="53" y="217" width="107" height="53" fill="#3498db" rx="3"/>
    <text x="107" y="250" text-anchor="middle" font-size="11" fill="white">货架3</text>

    <rect x="240" y="217" width="80" height="80" fill="#3498db" rx="3"/>
    <text x="280" y="264" text-anchor="middle" font-size="11" fill="white">货架4</text>

    <rect x="107" y="350" width="107" height="53" fill="#3498db" rx="3"/>
    <text x="160" y="383" text-anchor="middle" font-size="11" fill="white">货架5</text>

    <!-- 起点 -->
    <circle cx="27" cy="403" r="12" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
    <text x="27" y="408" text-anchor="middle" font-size="12" fill="white" font-weight="bold">S</text>
    <text x="27" y="435" text-anchor="middle" font-size="10" fill="#27ae60">起点(1,1)</text>

    <!-- 终点 -->
    <circle cx="373" cy="57" r="12" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="373" y="62" text-anchor="middle" font-size="12" fill="white" font-weight="bold">G</text>
    <text x="373" y="45" text-anchor="middle" font-size="10" fill="#e74c3c">终点(9,7)</text>

    <!-- 规划路径（红色曲线） -->
    <path d="M 27 403 C 40 370, 80 340, 120 310 C 160 280, 200 270, 240 280 C 280 290, 320 260, 340 220 C 360 180, 380 140, 380 100 C 380 80, 375 65, 373 57"
          fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 路径上的箭头 -->
    <polygon points="120,308 128,314 114,316" fill="#e74c3c" transform="rotate(-45, 120, 310)"/>
    <polygon points="280,278 288,284 274,286" fill="#e74c3c" transform="rotate(30, 280, 280)"/>
    <polygon points="380,100 388,106 374,108" fill="#e74c3c" transform="rotate(-80, 380, 100)"/>

    <!-- 图例 -->
    <rect x="10" y="445" width="380" height="50" fill="#f8f9fa" stroke="#dee2e6" rx="5"/>
    <rect x="20" y="455" width="20" height="12" fill="#3498db" rx="2"/>
    <text x="45" y="466" font-size="11" fill="#2c3e50">障碍物（货架）</text>
    <line x1="140" y1="461" x2="170" y2="461" stroke="#e74c3c" stroke-width="3"/>
    <text x="175" y="466" font-size="11" fill="#2c3e50">Hybrid A* 规划路径</text>
    <circle cx="300" cy="461" r="6" fill="#27ae60"/>
    <text x="310" y="466" font-size="11" fill="#2c3e50">起/终点</text>
    <text x="20" y="485" font-size="10" fill="#7f8c8d">地图：10m×8m | 分辨率：0.2m | 路径长度：11.04m</text>
  </g>

  <!-- 右侧：运动基元与算法原理 -->
  <g transform="translate(470, 60)">
    <text x="200" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">差速运动基元与节点扩展</text>

    <!-- 运动基元示意图 -->
    <rect x="0" y="20" width="400" height="200" fill="#f8f9fa" stroke="#dee2e6" rx="8"/>
    <text x="200" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">5种离散曲率运动基元（步长d=0.5m）</text>

    <!-- 当前节点 -->
    <circle cx="80" cy="160" r="8" fill="#2c3e50"/>
    <text x="80" y="185" text-anchor="middle" font-size="10" fill="#7f8c8d">当前节点</text>

    <!-- 运动基元曲线 -->
    <!-- 大左转 -->
    <path d="M 88 160 Q 120 100, 180 60" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="190" y="55" font-size="10" fill="#e67e22">κ=-1.11</text>
    <text x="190" y="68" font-size="9" fill="#95a5a6">R=0.90m</text>

    <!-- 小左转 -->
    <path d="M 88 160 Q 140 120, 220 80" fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="228" y="77" font-size="10" fill="#f39c12">κ=-0.52</text>
    <text x="228" y="90" font-size="9" fill="#95a5a6">R=1.92m</text>

    <!-- 直行 -->
    <path d="M 88 160 L 280 160" fill="none" stroke="#27ae60" stroke-width="2.5"/>
    <text x="290" y="165" font-size="10" fill="#27ae60">κ=0（直行）</text>

    <!-- 小右转 -->
    <path d="M 88 160 Q 140 200, 220 180" fill="none" stroke="#3498db" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="228" y="183" font-size="10" fill="#3498db">κ=0.52</text>
    <text x="228" y="196" font-size="9" fill="#95a5a6">R=1.92m</text>

    <!-- 大右转 -->
    <path d="M 88 160 Q 120 220, 180 200" fill="none" stroke="#9b59b6" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="190" y="207" font-size="10" fill="#9b59b6">κ=1.11</text>
    <text x="190" y="220" font-size="9" fill="#95a5a6">R=0.90m</text>

    <!-- 终端节点 -->
    <circle cx="280" cy="160" r="6" fill="#27ae60"/>
    <circle cx="180" cy="60" r="6" fill="#e67e22"/>
    <circle cx="220" cy="80" r="6" fill="#f39c12"/>
    <circle cx="220" cy="180" r="6" fill="#3498db"/>
    <circle cx="180" cy="200" r="6" fill="#9b59b6"/>

    <!-- 差速模型说明 -->
    <text x="200" y="210" text-anchor="middle" font-size="10" fill="#7f8c8d">前进/后退 × 5种曲率 = 10种运动基元</text>

    <!-- 代价函数说明 -->
    <rect x="0" y="240" width="400" height="80" fill="#fff3cd" stroke="#ffc107" rx="8"/>
    <text x="200" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">代价函数</text>
    <text x="200" y="285" text-anchor="middle" font-size="12" fill="#856404">f = g + h</text>
    <text x="50" y="305" font-size="11" fill="#856404">g：实际代价（含转弯惩罚、倒车惩罚）</text>
    <text x="50" y="320" font-size="11" fill="#856404">h：欧氏距离启发值</text>

    <!-- Hybrid A* vs 标准A* 对比 -->
    <rect x="0" y="340" width="400" height="130" fill="#e8f8f5" stroke="#1abc9c" rx="8"/>
    <text x="200" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#117a65">Hybrid A* 优势</text>

    <!-- 标准A*路径示意 -->
    <text x="30" y="390" font-size="11" fill="#e74c3c">标准 A*：</text>
    <path d="M 110 385 L 140 385 L 140 370 L 170 370 L 170 385 L 200 385 L 200 370 L 230 370 L 230 385 L 260 385"
          fill="none" stroke="#e74c3c" stroke-width="2"/>
    <text x="280" y="390" font-size="10" fill="#e74c3c">锯齿状折线</text>

    <!-- Hybrid A*路径示意 -->
    <text x="30" y="415" font-size="11" fill="#27ae60">Hybrid A*：</text>
    <path d="M 110 410 Q 150 395, 190 410 Q 230 425, 260 410"
          fill="none" stroke="#27ae60" stroke-width="2.5"/>
    <text x="280" y="415" font-size="10" fill="#27ae60">平滑曲线</text>

    <!-- 优势列表 -->
    <text x="30" y="440" font-size="11" fill="#117a65">• 节点状态：(x,y) → (x,y,θ)，含航向信息</text>
    <text x="30" y="455" font-size="11" fill="#117a65">• 满足差速运动学约束，无需后处理</text>
    <text x="30" y="470" font-size="11" fill="#117a65">• 路径可直接由底层PID控制器执行</text>
  </g>

  <!-- 底部：技术参数 -->
  <rect x="30" y="580" width="840" height="55" fill="#2c3e50" rx="8"/>
  <text x="450" y="600" text-anchor="middle" font-size="13" fill="white" font-weight="bold">仿真参数</text>
  <text x="150" y="620" text-anchor="middle" font-size="11" fill="#bdc3c7">地图：10m×8m</text>
  <text x="300" y="620" text-anchor="middle" font-size="11" fill="#bdc3c7">分辨率：0.2m</text>
  <text x="450" y="620" text-anchor="middle" font-size="11" fill="#bdc3c7">轮距L=0.52m</text>
  <text x="600" y="620" text-anchor="middle" font-size="11" fill="#bdc3c7">轮半径r=0.09m</text>
  <text x="750" y="620" text-anchor="middle" font-size="11" fill="#bdc3c7">迭代：3134次</text>
</svg>